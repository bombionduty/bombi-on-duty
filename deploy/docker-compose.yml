# Runs Bombi On Duty + Caddy (free auto-HTTPS) on your Droplet.
# Caddy gets a free Let's Encrypt certificate for your ${DOMAIN} (a nip.io
# hostname built from the Droplet IP) and forwards traffic to the bot.
#
# Start with:  docker compose -f deploy/docker-compose.yml up -d --build
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: ../.env
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      # Persist uploaded evidence (photos/screenshots) across redeploys.
      - app_data:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
  app_data:
